#DataBase
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/solicitation}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:solicitation@2026!}

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

#Elasticsearch
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.repository.auto-create-index.enabled=true

#Security
api.security.token.secretKey=${JWT_SECRET:solicitationSecretKey@2026!}

#Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always